<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Write</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f0e8;
            --fg: #2c2a26;
            --fg-muted: #9a9185;
            --cursor: #2c2a26;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1814;
                --fg: #e8e2d8;
                --fg-muted: #5c5750;
                --cursor: #e8e2d8;
            }
        }

        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(20px, 6vh, 80px) 24px;
            background-color: var(--bg);
        }

        #editor {
            width: 100%;
            max-width: 680px;
            flex: 1;
            outline: none;
            font-family: 'Lora', Georgia, serif;
            font-size: clamp(17px, 2vw, 20px);
            line-height: 1.85;
            color: var(--fg);
            caret-color: var(--cursor);
            letter-spacing: 0.01em;
            overflow-y: auto;
        }

        #editor p {
            margin-bottom: 1.2em;
        }

        /* Placeholder */
        #editor:empty::before {
            content: "Begin writing…";
            color: var(--fg-muted);
            font-style: italic;
        }

        /* Status */
        #status {
            position: fixed;
            bottom: 28px;
            right: 32px;
            display: flex;
            gap: 7px;
            font-size: 12px;
            color: var(--fg-muted);
            opacity: 0;
            transition: 0.4s;
        }

        #status.visible {
            opacity: 1;
        }

        #status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--fg-muted);
        }

        #status.saving #status-dot {
            background: #c8a96e;
        }

        #status.saved #status-dot {
            background: #7aaa7a;
        }

        /* Word count */
        #wordcount {
            position: fixed;
            bottom: 28px;
            left: 32px;
            font-size: 12px;
            color: var(--fg-muted);
            opacity: 0;
            transition: 0.4s;
        }

        #wordcount.visible {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- Editor -->
    <div id="editor" contenteditable="true"></div>

    <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">saved</span>
    </div>

    <div id="wordcount">0 words</div>

    <script>
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');
        const statusTxt = document.getElementById('status-text');
        const wc = document.getElementById('wordcount');

        const STORAGE_KEY = 'minimalist-pad-content';

        let saveTimer, hideTimer, wcTimer;

        // Restore
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            editor.innerHTML = saved;
            updateWordCount();
        } else {
            editor.innerHTML = "<p></p>";
        }

        // Word count
        function updateWordCount() {
            const text = editor.innerText.trim();
            const words = text ? text.split(/\s+/).length : 0;
            wc.textContent = words === 1 ? "1 word" : words + " words";
        }

        function showWC() {
            wc.classList.add('visible');
            clearTimeout(wcTimer);
            wcTimer = setTimeout(() => wc.classList.remove('visible'), 2000);
        }

        // Status
        function showStatus(state, text) {
            clearTimeout(hideTimer);
            status.className = "visible " + state;
            statusTxt.textContent = text;
        }

        function hideStatus() {
            hideTimer = setTimeout(() => status.classList.remove('visible'), 1500);
        }

        function saveNow() {
            const content = editor.innerHTML.trim();

            if (!content || content === "<p></p>") {
                localStorage.removeItem(STORAGE_KEY);
                showStatus("saved", "cleared");
            } else {
                localStorage.setItem(STORAGE_KEY, content);
                showStatus("saved", "saved");
            }

            hideStatus();
        }

        function scheduleSave() {
            showStatus("saving", "saving...");
            clearTimeout(saveTimer);
            saveTimer = setTimeout(saveNow, 1500);
        }

        // Ensure Enter creates paragraph
        editor.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                document.execCommand("formatBlock", false, "p");
            }
        });

        editor.addEventListener("input", () => {
            updateWordCount();
            showWC();
            scheduleSave();
        });

        window.addEventListener("beforeunload", saveNow);

        editor.focus();
    </script>

</body>

</html>
